name: CD

on:
  repository_dispatch:
    types: [deploy]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::643297135589:role/github-actions-radio-infra
          aws-region: eu-south-1

      - name: Trigger deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-07d2db88d6c9cb9c1" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["sudo /usr/local/bin/deploy.sh"]' \
            --query "Command.CommandId" \
            --output text)
          echo "Command ID: $COMMAND_ID"

          sleep 15

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "i-07d2db88d6c9cb9c1" \
            --query "StandardOutputContent" \
            --output text
